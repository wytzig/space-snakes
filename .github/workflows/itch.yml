name: Build for itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-itch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install pygame pygbag

      - name: Build WASM bundle
        run: python -m pygbag --build main.py

      - name: Upload itch.io artifact
        uses: actions/upload-artifact@v4
        with:
          name: space-snakes-itch-io
          path: build/web
          retention-days: 30
